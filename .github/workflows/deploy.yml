name: Deploy to Production

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            APP_DIR=/opt/apps/talent-claw-platform

            # Clone if not exists, otherwise pull
            if [ ! -d "$APP_DIR" ]; then
              git clone git@github.com:ottin4ttc/talent-claw-platform.git "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin master
            git reset --hard origin/master

            # Ensure shared network exists
            docker network create talent-claw_default 2>/dev/null || true

            # Sync nginx config
            cp nginx/trade.talentclaw.ai.conf /etc/nginx/sites-enabled/trade.talentclaw.ai.conf
            nginx -t && nginx -s reload

            # Build and restart services
            docker compose -f docker-compose.prod.yml build --no-cache
            docker compose -f docker-compose.prod.yml up -d

            # Clean up old images
            docker image prune -f
