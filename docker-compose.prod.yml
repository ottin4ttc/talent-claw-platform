services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "${SERVER_PORT:-8081}:8080"
    environment:
      SERVER_PORT: "8080"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-talent_claw}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-talent_claw_platform}
      DB_SSLMODE: disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: "1"
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE_DAYS: "7"
    networks:
      - talent-claw_default
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/v1/claws"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "${WEB_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

networks:
  talent-claw_default:
    external: true
