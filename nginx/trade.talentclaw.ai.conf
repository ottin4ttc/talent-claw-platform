server {
    listen 80;
    server_name trade.talentclaw.ai;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name trade.talentclaw.ai;

    ssl_certificate     /etc/nginx/ssl/talentclaw.ai.pem;
    ssl_certificate_key /etc/nginx/ssl/talentclaw.ai.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Platform API — reverse proxy to Go backend
    location /platform/ {
        proxy_pass http://127.0.0.1:8081/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Platform Web — reverse proxy to Next.js
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
